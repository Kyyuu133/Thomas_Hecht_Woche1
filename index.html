<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Mein Lieblingsrezept</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Mein Lieblingsrezept 🍝</h1>
</header>

<nav>
    <ul>
        <li><a href="#rezept">Rezept</a></li>
        <li><a href="#zutaten">Zutaten</a></li>
        <li><a href="#kontakt">Kontakt</a></li>
    </ul>
</nav>

<section id="rezept">
    <h2>Spaghetti Bolognese</h2>
    <p>Ein klassisches italienisches Gericht, einfach und lecker.</p>
</section>

<section id="zutaten">
    <h2>Zutaten</h2>
    <ul>
        <li>Spaghetti</li>
        <li>Hackfleisch</li>
        <li>Tomaten</li>
        <li>Zwiebeln</li>
        <li>Knoblauch</li>
    </ul>
</section>

<section id="kontakt">
    <h2>Kontakt</h2>

    <form>
        <label>Name:</label>
        <input type="text" name="name">

        <label>Email:</label>
        <input type="email" name="email">

        <button type="submit">Absenden</button>
    </form>

</section>

<footer>
    <p>© 2026 Mein Rezept</p>
</footer>

</body>
</html>
